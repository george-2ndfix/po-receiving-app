<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">
<title>QL-810W Label Test</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  @page {
    size: 38mm auto;
    margin: 2mm 2mm 2mm 2mm;
  }

  body {
    font-family: Arial, sans-serif;
    background: #f0f0f0;
  }

  /* Screen preview wrapper */
  .preview-area {
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 30px;
    align-items: flex-start;
  }

  .label-wrapper {
    background: white;
    border: 1px solid #999;
    border-radius: 4px;
    overflow: hidden;
    /* Show at ~3x scale on screen for visibility */
    width: calc(34mm * 3);
  }

  /* The actual label content */
  .label {
    width: 34mm;
    padding: 1mm;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 0.5mm;
    transform-origin: top left;
    transform: scale(3);
    min-height: 50mm;
  }

  .label-line {
    font-size: 7pt;
    line-height: 1.25;
    word-wrap: break-word;
    overflow-wrap: break-word;
    white-space: normal;
    width: 100%;
  }

  .label-line.bold {
    font-size: 8pt;
    font-weight: bold;
  }

  .label-line.small {
    font-size: 6pt;
  }

  /* Print: one label per page, no screen decorations */
  @media print {
    body { background: white; }
    .preview-area { padding: 0; gap: 0; align-items: stretch; }
    .label-wrapper {
      border: none;
      width: 100%;
      page-break-after: always;
    }
    .label {
      width: 100%;
      transform: none;
      min-height: 0;
      padding: 1mm;
    }
    .controls { display: none; }
    h1 { display: none; }
  }
</style>
</head>
<body>

<div class="controls" style="padding:20px;background:#333;color:white;margin-bottom:10px;">
  <h1 style="font-size:18px;margin-bottom:10px;">QL-810W Label Test — 38mm Tape</h1>
  <p style="font-size:13px;margin-bottom:10px;">Labels below shown at 3× screen scale. Click Print to send to printer.</p>
  <p style="font-size:12px;color:#aaa;margin-bottom:15px;">⚙️ Print settings: Paper = 38mm, Portrait, No margins (or Minimum), Scale = 100%</p>
  <button onclick="window.print()" style="background:#2ecc71;color:white;border:none;padding:10px 24px;font-size:16px;border-radius:6px;cursor:pointer;">🖨️ Print All Labels</button>
</div>

<div class="preview-area" id="labelsArea">
</div>

<script>
const labels = [
  {
    job: "5364",
    customer: "LEE",
    partNo: "SPM-2040-720",
    description: "Colonial 4 panel 2040x720x35 SPM door",
    qty: 2,
    storage: "Customer Cupboard",
    date: "10/04/2026",
    po: "21027"
  },
  {
    job: "5391",
    customer: "O'BRIEN FAMILY TRUST",
    partNo: "LCK-ERA-SSS",
    description: "Era Entrance Set Satin Stainless",
    qty: 6,
    storage: "Van Stock",
    date: "10/04/2026",
    po: "21031"
  },
  {
    job: "5280",
    customer: "WU",
    partNo: "HNG-100-BLK",
    description: "100mm Black Butt Hinge Pair",
    qty: 24,
    storage: "Shed",
    date: "10/04/2026",
    po: "21019"
  },
  {
    job: "5410",
    customer: "JOHNSON & ASSOCIATES PTY LTD",
    partNo: "HDW-DRP-GRY",
    description: "Heavy duty door roller grey nylon wheel complete assembly",
    qty: 1,
    storage: "Customer Cupboard",
    date: "10/04/2026",
    po: "21045"
  }
];

function buildLabel(l) {
  const div = document.createElement('div');
  div.className = 'label-wrapper';

  // Line 1: Job + Customer (bold)
  // Line 2: Part No + Description  
  // Line 3: Qty + Storage + Date + PO

  div.innerHTML = `
    <div class="label" id="label_${l.po}">
      <div class="label-line bold">Job ${l.job} · ${l.customer}</div>
      <div class="label-line">${l.partNo} · ${l.description}</div>
      <div class="label-line small">Qty: ${l.qty} · ${l.storage} · ${l.date} · PO ${l.po}</div>
    </div>
  `;
  return div;
}

const area = document.getElementById('labelsArea');
labels.forEach(l => area.appendChild(buildLabel(l)));
</script>

</body>
</html>
